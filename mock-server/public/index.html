<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DID Canvas Editor (React)</title>
  <style>
    :root {
      --bg: #ececec;
      --panel: #f6f6f6;
      --line: #d8d8d8;
      --text: #2f2f2f;
      --muted: #7a7a7a;
      --accent: #00c7df;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Pretendard", sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
    }
    #root { height: 100%; }
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 52px 1fr;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .top input, .top button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
    }
    .top button { cursor: pointer; }
    .save { background: #1f6fff; color: #fff; border-color: #1f6fff; }
    .ver { font-size: 12px; color: var(--muted); margin-left: auto; }
    .status { font-size: 12px; color: #444; margin-left: 10px; }
    .status.err { color: #c53030; }

    .main {
      display: grid;
      grid-template-columns: 72px 1fr 300px;
      min-height: 0;
    }

    .left {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .tool {
      width: 52px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 4px;
      text-align: center;
      font-size: 11px;
      color: #555;
      cursor: pointer;
      background: transparent;
    }
    .tool:hover { border-color: var(--line); background: #fff; }
    .tool .icon { font-size: 18px; display: block; margin-bottom: 5px; }

    .center {
      display: grid;
      place-items: center;
      min-height: 0;
      overflow: auto;
      background: #e5e5e5;
      padding: 20px;
    }
    .stage {
      position: relative;
      background: #ddd;
      border: 1px solid #c8c8c8;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      transform-origin: top left;
      background-image:
        linear-gradient(to right, rgba(0,0,0,.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .block {
      position: absolute;
      border: 2px solid rgba(0,0,0,.28);
      background: rgba(255,255,255,.22);
      cursor: move;
      user-select: none;
      overflow: hidden;
    }
    .block.sel {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }
    .tag {
      position: absolute;
      left: 0;
      top: 0;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 10px;
      padding: 2px 5px;
    }
    .preview {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      color: #222;
      text-align: center;
      padding: 8px;
    }
    .handle {
      width: 10px;
      height: 10px;
      background: #fff;
      border: 1px solid #666;
      border-radius: 2px;
      position: absolute;
    }
    .h-tl { left: -6px; top: -6px; cursor: nwse-resize; }
    .h-tr { right: -6px; top: -6px; cursor: nesw-resize; }
    .h-bl { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .h-br { right: -6px; bottom: -6px; cursor: nwse-resize; }

    .right {
      border-left: 1px solid var(--line);
      background: var(--panel);
      min-height: 0;
      overflow: auto;
    }
    .card {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      background: #f9f9f9;
    }
    .card h4 { margin: 0 0 10px; font-size: 13px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field label { display:block; font-size:11px; color:var(--muted); margin-bottom:3px; }
    .field input, .field select {
      width:100%; border:1px solid var(--line); border-radius:6px; padding:6px; font-size:12px;
      background: #fff;
    }
    .coords {
      background:#fff; border:1px dashed var(--line); border-radius:8px; padding:8px; font-size:12px;
    }
    .asset-list { display:grid; gap:6px; }
    .asset-item { border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px; font-size:12px; }
    .btns { display:flex; gap:6px; margin-top:8px; }
    .btns button { border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12px; cursor:pointer; }
    .power-toggle { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .power-toggle label { font-size:12px; }
    .switch { position:relative; width:40px; height:22px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:22px; transition:.3s; }
    .slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; }
    .switch input:checked + .slider { background:var(--accent); }
    .switch input:checked + .slider:before { transform:translateX(18px); }
    .power-status { font-size:11px; padding:4px 8px; border-radius:4px; margin-top:8px; }
    .power-status.on { background:#e6f7e6; color:#2d7a2d; }
    .power-status.off { background:#fde8e8; color:#c53030; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const MAX_ZONES = 5;
    const DEV_JWT_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJkaWQtMDAxIiwicm9sZSI6ImRldiJ9.mTWi_MeRhODeQ382jeLB26y2rTgE-kyqOIbovUjKUAM';
    const uid = p => `${p}_${Math.random().toString(36).slice(2, 8)}`;
    const num = (v, f = 0) => Number.isFinite(Number(v)) ? Number(v) : f;
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    function App() {
      const [snapshot, setSnapshot] = useState(null);
      const [didId, setDidId] = useState('did-001');
      const [token, setToken] = useState(DEV_JWT_TOKEN);
      const [selectedZoneId, setSelectedZoneId] = useState(null);
      const [status, setStatus] = useState({ text: 'ready', isErr: false });
      const [powerSchedule, setPowerSchedule] = useState({ enabled: false, powerOffTime: '23:00', powerOnTime: '07:00' });
      const centerRef = useRef(null);
      const dragRef = useRef(null);
      const [centerSize, setCenterSize] = useState({ w: 0, h: 0 });

      const selectedZone = useMemo(() => {
        if (!snapshot) return null;
        return snapshot.layout.zones.find(z => z.id === selectedZoneId) || null;
      }, [snapshot, selectedZoneId]);

      const scaleInfo = useMemo(() => {
        if (!snapshot) return { cw: 1920, ch: 1080, scale: 1 };
        const cw = snapshot.layout.canvas.width;
        const ch = snapshot.layout.canvas.height;
        const maxW = Math.max(200, centerSize.w - 40);
        const maxH = Math.max(200, centerSize.h - 40);
        const scale = Math.max(0.25, Math.min(maxW / cw, maxH / ch));
        return { cw, ch, scale };
      }, [snapshot, centerSize]);

      useEffect(() => {
        const updateSize = () => {
          if (!centerRef.current) return;
          setCenterSize({
            w: centerRef.current.clientWidth,
            h: centerRef.current.clientHeight
          });
        };
        updateSize();
        window.addEventListener('resize', updateSize);
        return () => window.removeEventListener('resize', updateSize);
      }, []);

      useEffect(() => {
        const onMove = e => {
          const d = dragRef.current;
          if (!d || !snapshot) return;
          const zone = snapshot.layout.zones.find(x => x.id === d.id);
          if (!zone) return;

          const stage = document.getElementById('stage');
          if (!stage) return;
          const rect = stage.getBoundingClientRect();
          const x = (e.clientX - rect.left) / scaleInfo.scale;
          const y = (e.clientY - rect.top) / scaleInfo.scale;
          const dx = x - d.sx;
          const dy = y - d.sy;

          setSnapshot(prev => {
            const next = structuredClone(prev);
            const z = next.layout.zones.find(x => x.id === d.id);
            if (!z) return prev;

            if (d.mode === 'move') {
              z.x = clamp(d.ox + dx, 0, scaleInfo.cw - z.width);
              z.y = clamp(d.oy + dy, 0, scaleInfo.ch - z.height);
            } else {
              if (d.pos.includes('r')) z.width = clamp(d.ow + dx, 20, scaleInfo.cw - z.x);
              if (d.pos.includes('b')) z.height = clamp(d.oh + dy, 20, scaleInfo.ch - z.y);
              if (d.pos.includes('l')) {
                const nx = clamp(d.ox + dx, 0, d.ox + d.ow - 20);
                const nw = d.ow + (d.ox - nx);
                z.x = nx;
                z.width = nw;
              }
              if (d.pos.includes('t')) {
                const ny = clamp(d.oy + dy, 0, d.oy + d.oh - 20);
                const nh = d.oh + (d.oy - ny);
                z.y = ny;
                z.height = nh;
              }
            }
            return next;
          });
        };

        const onUp = () => {
          dragRef.current = null;
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        };
      }, [snapshot, scaleInfo]);

      const setStatusText = (text, isErr = false) => setStatus({ text, isErr });

      const normalize = arr => arr.forEach((x, i) => { x.order = i; });

      const ensurePlaylist = (snap, zoneId) => {
        if (!snap.zonePlaylists[zoneId]) snap.zonePlaylists[zoneId] = [];
        return snap.zonePlaylists[zoneId];
      };

      const loadSnapshot = async () => {
        const target = didId.trim() || 'did-001';
        try {
          setStatusText('불러오는 중...');
          const res = await fetch(`/api/admin/snapshots/${target}`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          setSnapshot(data);
          setSelectedZoneId(data.layout?.zones?.[0]?.id || null);
          setStatusText(`불러오기 성공 (${target})`);
        } catch (e) {
          setStatusText(`불러오기 실패: ${e.message}`, true);
          alert(`불러오기 실패\n${e.message}\n\n서버 실행/URL/didId를 확인하세요.`);
        }
      };

      const loadPowerSchedule = async () => {
        const target = didId.trim() || 'did-001';
        try {
          const res = await fetch(`/api/admin/devices/${target}/power-schedule`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            setPowerSchedule({
              enabled: data.enabled || false,
              powerOffTime: data.powerOffTime || '23:00',
              powerOnTime: data.powerOnTime || '07:00'
            });
          }
        } catch (e) {
          console.warn('Power schedule load failed:', e.message);
        }
      };

      const savePowerSchedule = async () => {
        const target = didId.trim() || 'did-001';
        try {
          const res = await fetch(`/api/admin/devices/${target}/power-schedule`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify(powerSchedule)
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setStatusText('전원 스케줄 저장 완료');
        } catch (e) {
          setStatusText(`전원 스케줄 저장 실패: ${e.message}`, true);
        }
      };

      const saveSnapshot = async () => {
        if (!snapshot) return;
        const target = didId.trim() || 'did-001';
        try {
          setStatusText('저장 중...');
          const payload = structuredClone(snapshot);
          Object.keys(payload.zonePlaylists).forEach(zid => normalize(payload.zonePlaylists[zid]));

          console.group('[DID Admin] Save + Deploy');
          console.log('didId:', target);
          console.log('API Request -> POST /api/admin/snapshots/:didId payload:', payload);

          const res = await fetch(`/api/admin/snapshots/${target}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify(payload)
          });
          const out = await res.json();
          console.log('API Response:', out);
          if (!res.ok) throw new Error(out.error || `HTTP ${res.status}`);

          const wsPayload = {
            type: 'SNAPSHOT_UPDATED',
            payload: {
              ...payload,
              version: out.version
            }
          };
          console.log('WebSocket Broadcast -> /ws/player-snapshot payload:', wsPayload);
          console.groupEnd();

          await loadSnapshot();
          setStatusText(`저장 완료 (v${out.version})`);
        } catch (e) {
          console.groupEnd();
          setStatusText(`저장 실패: ${e.message}`, true);
          alert(`저장 실패\n${e.message}`);
        }
      };

      const addAsset = type => {
        if (!snapshot) return;
        const id = uid(type.toLowerCase());
        setSnapshot(prev => {
          const next = structuredClone(prev);
          next.assets[id] = {
            id,
            type,
            source: type === 'TEXT' ? '새 텍스트' : '',
            metadata: {},
            defaultDurationSec: type === 'VIDEO' ? 30 : 10
          };
          return next;
        });
      };

      const addZone = () => {
        if (!snapshot) return;
        if (snapshot.layout.zones.length >= MAX_ZONES) {
          alert(`영역 갯수를 초과했습니다. 최대 ${MAX_ZONES}개까지 추가할 수 있습니다.`);
          return;
        }
        setSnapshot(prev => {
          const next = structuredClone(prev);
          const id = uid('zone');
          next.layout.zones.push({
            id,
            x: Math.round(scaleInfo.cw * 0.1),
            y: Math.round(scaleInfo.ch * 0.1),
            width: 320,
            height: 220,
            zIndex: next.layout.zones.length,
            backgroundHex: '#444444',
            fitMode: 'COVER'
          });
          next.zonePlaylists[id] = [];
          setSelectedZoneId(id);
          return next;
        });
      };

      const removeSelectedZone = () => {
        if (!snapshot || !selectedZoneId) return;
        setSnapshot(prev => {
          const next = structuredClone(prev);
          next.layout.zones = next.layout.zones.filter(z => z.id !== selectedZoneId);
          delete next.zonePlaylists[selectedZoneId];
          const nextId = next.layout.zones[0]?.id || null;
          setSelectedZoneId(nextId);
          return next;
        });
      };

      const updateSelectedZone = patcher => {
        if (!snapshot || !selectedZoneId) return;
        setSnapshot(prev => {
          const next = structuredClone(prev);
          const z = next.layout.zones.find(x => x.id === selectedZoneId);
          if (!z) return prev;
          patcher(z, next);
          return next;
        });
      };

      const deleteAsset = assetId => {
        if (!snapshot) return;
        setSnapshot(prev => {
          const next = structuredClone(prev);
          delete next.assets[assetId];
          Object.keys(next.zonePlaylists).forEach(zid => {
            next.zonePlaylists[zid] = next.zonePlaylists[zid].filter(it => it.assetId !== assetId);
            normalize(next.zonePlaylists[zid]);
          });
          return next;
        });
      };

      const addAssetToPlaylist = assetId => {
        if (!snapshot || !selectedZoneId || !assetId) return;
        setSnapshot(prev => {
          const next = structuredClone(prev);
          const pl = ensurePlaylist(next, selectedZoneId);
          pl.push({ assetId, order: pl.length, durationSec: null, transition: 'NONE' });
          return next;
        });
      };

      useEffect(() => {
        loadSnapshot();
        loadPowerSchedule();
      }, []);

      const zonePlaylist = useMemo(() => {
        if (!snapshot || !selectedZoneId) return [];
        return snapshot.zonePlaylists[selectedZoneId] || [];
      }, [snapshot, selectedZoneId]);

      return (
        <div className="app">
          <div className="top">
            <strong>DID Canvas Editor (React)</strong>
            <span style={{ fontSize: 12, color: '#777' }}>DID</span>
            <input value={didId} onChange={e => setDidId(e.target.value)} />
            <input
              style={{ width: 280 }}
              placeholder="JWT Bearer Token"
              value={token}
              onChange={e => setToken(e.target.value)}
            />
            <button onClick={loadSnapshot}>불러오기</button>
            <button className="save" onClick={saveSnapshot}>저장 + 배포</button>
            <span className="ver">version: {snapshot?.version ?? '-'}</span>
            <span className={status.isErr ? 'status err' : 'status'}>{status.text}</span>
          </div>

          <div className="main">
            <aside className="left">
              <button className="tool" onClick={() => addAsset('IMAGE')}><span className="icon">🖼️</span>그래픽</button>
              <button className="tool" onClick={() => addAsset('VIDEO')}><span className="icon">🎬</span>동영상</button>
              <button className="tool" onClick={() => addAsset('TEXT')}><span className="icon">🅣</span>텍스트</button>
              <button className="tool" onClick={addZone}><span className="icon">▣</span>영역</button>
              <button className="tool" onClick={removeSelectedZone}><span className="icon">🗑️</span>삭제</button>
            </aside>

            <section className="center" ref={centerRef}>
              {snapshot && (
                <div
                  id="stage"
                  className="stage"
                  style={{
                    width: `${scaleInfo.cw}px`,
                    height: `${scaleInfo.ch}px`,
                    transform: `scale(${scaleInfo.scale})`
                  }}
                >
                  {snapshot.layout.zones.slice().sort((a, b) => a.zIndex - b.zIndex).map(zone => {
                    const arr = snapshot.zonePlaylists[zone.id] || [];
                    return (
                      <div
                        key={zone.id}
                        className={`block ${zone.id === selectedZoneId ? 'sel' : ''}`}
                        style={{
                          left: `${zone.x}px`,
                          top: `${zone.y}px`,
                          width: `${zone.width}px`,
                          height: `${zone.height}px`,
                          zIndex: `${100 + zone.zIndex}`,
                          background: zone.backgroundHex ? `${zone.backgroundHex}55` : undefined
                        }}
                        onPointerDown={e => {
                          setSelectedZoneId(zone.id);
                          const stage = document.getElementById('stage');
                          const rect = stage.getBoundingClientRect();
                          const px = (e.clientX - rect.left) / scaleInfo.scale;
                          const py = (e.clientY - rect.top) / scaleInfo.scale;
                          const isHandle = e.target.classList.contains('handle');
                          dragRef.current = {
                            mode: isHandle ? 'resize' : 'move',
                            pos: isHandle ? e.target.dataset.pos : null,
                            id: zone.id,
                            sx: px,
                            sy: py,
                            ox: zone.x,
                            oy: zone.y,
                            ow: zone.width,
                            oh: zone.height
                          };
                          e.currentTarget.setPointerCapture(e.pointerId);
                        }}
                      >
                        <div className="tag">{zone.id}</div>
                        <div className="preview">{arr.length ? arr.map(i => i.assetId).join(' | ') : 'Empty'}</div>
                        <div className="handle h-tl" data-pos="tl" />
                        <div className="handle h-tr" data-pos="tr" />
                        <div className="handle h-bl" data-pos="bl" />
                        <div className="handle h-br" data-pos="br" />
                      </div>
                    );
                  })}
                </div>
              )}
            </section>

            <aside className="right">
              <div className="card">
                <h4>전원 스케줄</h4>
                <div className="power-toggle">
                  <label className="switch">
                    <input type="checkbox" checked={powerSchedule.enabled} onChange={e => setPowerSchedule(prev => ({ ...prev, enabled: e.target.checked }))} />
                    <span className="slider"></span>
                  </label>
                  <label>{powerSchedule.enabled ? '활성화' : '비활성화'}</label>
                </div>
                {powerSchedule.enabled && (
                  <div>
                    <div className="row">
                      <div className="field">
                        <label>종료 시간</label>
                        <input type="time" value={powerSchedule.powerOffTime} onChange={e => setPowerSchedule(prev => ({ ...prev, powerOffTime: e.target.value }))} />
                      </div>
                      <div className="field">
                        <label>시작 시간</label>
                        <input type="time" value={powerSchedule.powerOnTime} onChange={e => setPowerSchedule(prev => ({ ...prev, powerOnTime: e.target.value }))} />
                      </div>
                    </div>
                    <div className="btns" style={{ marginTop: 8 }}>
                      <button style={{ background: '#1f6fff', color: '#fff', borderColor: '#1f6fff' }} onClick={savePowerSchedule}>스케줄 저장</button>
                    </div>
                    <div className={`power-status ${(() => {
                      if (!powerSchedule.enabled) return '';
                      const now = new Date();
                      const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                      const off = powerSchedule.powerOffTime;
                      const on = powerSchedule.powerOnTime;
                      if (off < on) return (hhmm >= off && hhmm < on) ? 'off' : 'on';
                      return (hhmm >= off || hhmm < on) ? 'off' : 'on';
                    })()}`}>
                      현재 상태: {(() => {
                        if (!powerSchedule.enabled) return '스케줄 없음';
                        const now = new Date();
                        const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                        const off = powerSchedule.powerOffTime;
                        const on = powerSchedule.powerOnTime;
                        if (off < on) return (hhmm >= off && hhmm < on) ? '종료 시간대' : '운영 중';
                        return (hhmm >= off || hhmm < on) ? '종료 시간대' : '운영 중';
                      })()}
                    </div>
                  </div>
                )}
              </div>

              <div className="card">
                <h4>선택 객체 좌표</h4>
                <div className="coords">
                  {selectedZone
                    ? `x: ${Math.round(selectedZone.x)}, y: ${Math.round(selectedZone.y)}, w: ${Math.round(selectedZone.width)}, h: ${Math.round(selectedZone.height)} (canvas px)`
                    : '선택 없음'}
                </div>
              </div>

              <div className="card">
                <h4>속성</h4>
                <div className="row">
                  <div className="field"><label>X</label><input type="number" value={selectedZone ? Math.round(selectedZone.x) : ''} onChange={e => updateSelectedZone(z => { z.x = clamp(num(e.target.value, z.x), 0, scaleInfo.cw - z.width); })} /></div>
                  <div className="field"><label>Y</label><input type="number" value={selectedZone ? Math.round(selectedZone.y) : ''} onChange={e => updateSelectedZone(z => { z.y = clamp(num(e.target.value, z.y), 0, scaleInfo.ch - z.height); })} /></div>
                  <div className="field"><label>W</label><input type="number" value={selectedZone ? Math.round(selectedZone.width) : ''} onChange={e => updateSelectedZone(z => { z.width = clamp(num(e.target.value, z.width), 20, scaleInfo.cw - z.x); })} /></div>
                  <div className="field"><label>H</label><input type="number" value={selectedZone ? Math.round(selectedZone.height) : ''} onChange={e => updateSelectedZone(z => { z.height = clamp(num(e.target.value, z.height), 20, scaleInfo.ch - z.y); })} /></div>
                </div>
                <div className="field" style={{ marginTop: 8 }}><label>배경색(hex)</label><input value={selectedZone?.backgroundHex || ''} onChange={e => updateSelectedZone(z => { z.backgroundHex = e.target.value.trim() || null; })} /></div>
                <div className="field" style={{ marginTop: 8 }}><label>zIndex</label><input type="number" value={selectedZone?.zIndex ?? ''} onChange={e => updateSelectedZone(z => { z.zIndex = Math.round(num(e.target.value, z.zIndex)); })} /></div>
              </div>

              <div className="card">
                <h4>에셋 관리</h4>
                <div className="field">
                  <label>선택 영역에 에셋 할당</label>
                  <select id="assetSelect">
                    <option value="">-- 에셋 선택 --</option>
                    {snapshot && Object.values(snapshot.assets).map(a => (
                      <option key={a.id} value={a.id}>{a.id} ({a.type})</option>
                    ))}
                  </select>
                </div>
                <div className="btns">
                  <button onClick={() => addAssetToPlaylist(document.getElementById('assetSelect')?.value)}>재생목록 추가</button>
                </div>
                <div style={{ marginTop: 8 }}>
                  {zonePlaylist.map((item, i) => (
                    <div className="asset-item" key={`${item.assetId}_${i}`}>
                      <div><strong>{i}. {item.assetId}</strong></div>
                      <div className="row" style={{ marginTop: 4 }}>
                        <div className="field"><label>duration</label><input type="number" value={item.durationSec ?? ''} onChange={e => {
                          const v = num(e.target.value, null);
                          setSnapshot(prev => {
                            const next = structuredClone(prev);
                            const pl = ensurePlaylist(next, selectedZoneId);
                            pl[i].durationSec = Number.isFinite(v) ? v : null;
                            return next;
                          });
                        }} /></div>
                        <div className="field"><label>order</label><input type="number" value={item.order} onChange={e => {
                          const v = Math.max(0, Math.round(num(e.target.value, i)));
                          setSnapshot(prev => {
                            const next = structuredClone(prev);
                            const pl = ensurePlaylist(next, selectedZoneId);
                            pl[i].order = v;
                            pl.sort((a, b) => a.order - b.order);
                            normalize(pl);
                            return next;
                          });
                        }} /></div>
                      </div>
                      <div className="btns">
                        <button onClick={() => {
                          setSnapshot(prev => {
                            const next = structuredClone(prev);
                            const pl = ensurePlaylist(next, selectedZoneId);
                            pl.splice(i, 1);
                            normalize(pl);
                            return next;
                          });
                        }}>삭제</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="card">
                <h4>Asset 라이브러리</h4>
                <div className="asset-list">
                  {snapshot && Object.values(snapshot.assets).map(asset => (
                    <div className="asset-item" key={asset.id}>
                      <div><strong>{asset.id}</strong> <span style={{ color: '#777' }}>{asset.type}</span></div>
                      <div className="field"><label>source</label><input value={asset.source || ''} onChange={e => {
                        const val = e.target.value;
                        setSnapshot(prev => {
                          const next = structuredClone(prev);
                          next.assets[asset.id].source = val;
                          return next;
                        });
                      }} /></div>
                      <div className="btns"><button onClick={() => deleteAsset(asset.id)}>삭제</button></div>
                    </div>
                  ))}
                </div>
              </div>
            </aside>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
